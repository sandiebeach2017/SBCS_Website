<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img"
    aria-labelledby="title desc">
    <title id="title">Sandra Bryant personal branding website thumbnail</title>
    <desc id="desc">A stylized thumbnail with navy gradient and text for personal branding and
        LinkedIn career pivot support.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#08285f" />
            <stop offset="100%" stop-color="#0c68c9" />
        </linearGradient>
    </defs>
    <rect width="1200" height="750" fill="url(#bg)" />
    <rect x="80" y="90" width="1040" height="570" rx="28" fill="#ffffff" fill-opacity="0.1" />
    <text x="120" y="220" fill="#ffb81f" font-family="Arial, Helvetica, sans-serif" font-size="30"
        font-weight="700" letter-spacing="3">PERSONAL BRANDING</text>
    <text x="120" y="300" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="62"
        font-weight="800">Sandra Bryant</text>
    <text x="120" y="370" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="32">LinkedIn
        Optimization for Career Pivoting</text>
    <text x="120" y="460" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28">Clear
        brand story • Stronger visibility • Interview momentum</text>
    <rect x="120" y="510" width="330" height="70" rx="14" fill="#ffb81f" />
    <text x="160" y="555" fill="#08285f" font-family="Arial, Helvetica, sans-serif" font-size="28"
        font-weight="800">Live Project</text>
</svg>