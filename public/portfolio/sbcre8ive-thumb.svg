    <rect x="115" y="445" width="300" height="64" rx="12" fill="#3cc8ef" />
    <text x="156" y="486" fill="#08285f" font-family="Arial, Helvetica, sans-serif" font-size="27"
        font-weight="800">Live Project</text>
    <rect x="435" y="445" width="390" height="64" rx="12" fill="#ffffff" fill-opacity="0.16" />
    <text x="470" y="486" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="27"
